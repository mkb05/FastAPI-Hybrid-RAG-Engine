<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Veris Engine | Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.production.min.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
    ></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      body {
        background-color: #0b0f19;
        color: #f1f5f9;
      }
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-thumb {
        background: #1e293b;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect } = React;
      const { Send, Plus, Bot, Menu, Sparkles, AlertCircle } = window.lucide;

      function App() {
        const [messages, setMessages] = useState([
          {
            role: "AI",
            content:
              "Welcome to Veris Engine. I am initialized and ready for your queries.",
          },
        ]);
        const [input, setInput] = useState("");
        const [loading, setLoading] = useState(false);

        const demoAnswers = {
          "how does crag work?":
            "Veris Engine uses a multi-agent pipeline. It retrieves data, a Grader Agent verifies relevance to prevent hallucinations, and then a Synthesizer builds your answer.",
          "what is veris?":
            "Veris is an enterprise-grade Corrective RAG (CRAG) system designed to provide grounded, verified answers from your proprietary documents.",
          features:
            "1. Anti-hallucination guardrails | 2. Hybrid Search (Vector + BM25) | 3. Data isolation per session | 4. Persistent chat memory.",
        };

        const sendMessage = async () => {
          if (!input.trim()) return;
          const userMsg = input;
          setMessages((prev) => [...prev, { role: "User", content: userMsg }]);
          setInput("");
          setLoading(true);

          // Simulate network latency
          setTimeout(() => {
            const normalized = userMsg.toLowerCase().trim();
            const response =
              demoAnswers[normalized] ||
              "I've analyzed your query using my hybrid retrieval pipeline and determined that the information is currently being processed by the Veris Engine.";
            setMessages((prev) => [...prev, { role: "AI", content: response }]);
            setLoading(false);
          }, 800);
        };

        return (
          <div className="flex h-screen w-screen bg-[#0B0F19] text-slate-200 overflow-hidden">
            <aside className="hidden md:flex w-72 bg-[#0F1420] border-r border-slate-800 flex-col p-4">
              <h1 className="text-xl font-bold text-indigo-400 mb-6 flex items-center gap-2">
                <Sparkles size={20} /> Veris Engine
              </h1>
              <div className="text-xs text-slate-500 font-bold uppercase tracking-wider mb-4">
                Demo Mode Active
              </div>
              <div className="p-3 bg-amber-500/10 border border-amber-500/20 rounded-lg text-amber-500 text-sm flex items-center gap-2">
                <AlertCircle size={16} /> Backend disconnected (Demo Mode)
              </div>
            </aside>

            <main className="flex-1 flex flex-col h-full">
              <div className="flex-1 overflow-y-auto p-6 space-y-6">
                {messages.map((m, i) => (
                  <div
                    key={i}
                    className={`flex gap-4 ${m.role === "User" ? "justify-end" : ""}`}
                  >
                    {m.role === "AI" && (
                      <div className="w-9 h-9 rounded-full bg-indigo-500/10 flex items-center justify-center border border-indigo-500/20">
                        <Bot size={18} className="text-indigo-400" />
                      </div>
                    )}
                    <div
                      className={`max-w-[70%] p-4 rounded-2xl ${m.role === "User" ? "bg-indigo-600" : "bg-[#161B28] border border-slate-800"}`}
                    >
                      {m.content}
                    </div>
                  </div>
                ))}
                {loading && (
                  <div className="pl-12 text-slate-500 text-sm">
                    Veris is thinking...
                  </div>
                )}
              </div>
              <div className="p-6">
                <div className="max-w-4xl mx-auto flex items-center gap-3 bg-[#161B28] p-3 rounded-2xl border border-slate-800 focus-within:border-indigo-500/50 transition">
                  <input
                    value={input}
                    onChange={(e) => setInput(e.target.value)}
                    onKeyPress={(e) => e.key === "Enter" && sendMessage()}
                    placeholder="Ask the Veris Engine..."
                    className="flex-1 bg-transparent p-2 focus:outline-none"
                  />
                  <button
                    onClick={sendMessage}
                    className="bg-indigo-600 hover:bg-indigo-700 p-2 rounded-xl transition"
                  >
                    <Send size={20} />
                  </button>
                </div>
              </div>
            </main>
          </div>
        );
      }
      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
