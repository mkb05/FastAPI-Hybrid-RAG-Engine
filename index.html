<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Enterprise RAG Navigator</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: #121212;
        color: #ffffff;
        margin: 0;
        padding: 0;
        display: flex;
        height: 100vh;
      }
      .sidebar {
        width: 280px;
        background-color: #1e1e1e;
        padding: 20px;
        border-right: 1px solid #333;
        display: flex;
        flex-direction: column;
      }
      .main-chat {
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .chat-header {
        padding: 20px;
        background-color: #1e1e1e;
        border-bottom: 1px solid #333;
        font-weight: bold;
        font-size: 1.2rem;
      }
      .chat-history {
        flex-grow: 1;
        padding: 20px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 15px;
      }
      .message {
        padding: 15px;
        border-radius: 8px;
        max-width: 80%;
        line-height: 1.5;
      }
      .user-msg {
        background-color: #2b5278;
        align-self: flex-end;
      }
      .ai-msg {
        background-color: #2d2d2d;
        align-self: flex-start;
        border: 1px solid #444;
        width: 100%;
        max-width: 90%;
      }
      .input-area {
        padding: 20px;
        background-color: #1e1e1e;
        border-top: 1px solid #333;
        display: flex;
        gap: 10px;
      }
      input[type="text"] {
        flex-grow: 1;
        padding: 15px;
        border-radius: 8px;
        border: 1px solid #444;
        background-color: #121212;
        color: white;
        font-size: 1rem;
      }
      button {
        padding: 15px 30px;
        border-radius: 8px;
        border: none;
        background-color: #3b82f6;
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
      }
      button:hover {
        background-color: #2563eb;
      }
      .loading {
        display: none;
        align-self: flex-start;
        font-style: italic;
        color: #888;
      }
      .sidebar-section {
        margin-top: 20px;
        border-top: 1px solid #333;
        padding-top: 15px;
        flex-grow: 1;
        overflow-y: auto;
      }
      .upload-btn {
        width: 100%;
        padding: 10px;
        background-color: #2d2d2d;
        border: 1px dashed #555;
        color: white;
        cursor: pointer;
        border-radius: 5px;
      }
      .upload-btn:hover {
        background-color: #3b3b3b;
      }
      .new-chat-btn {
        width: 100%;
        padding: 10px;
        background-color: #3b82f6;
        border: none;
        border-radius: 5px;
        color: white;
        cursor: pointer;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="sidebar">
      <h2 style="color: #3b82f6; margin-top: 0">Nexus RAG</h2>
      <p style="color: #888; font-size: 0.9rem">
        Status: <span style="color: #4ade80">Online</span>
      </p>
      <p style="color: #888; font-size: 0.9rem">Engine: Multi-Agent CRAG</p>
      <p style="color: #888; font-size: 0.9rem">Model: Llama 3.2 (3B)</p>

      <div
        style="margin-top: 20px; border-top: 1px solid #333; padding-top: 15px"
      >
        <h3 style="color: #ccc; font-size: 1rem; margin-bottom: 10px">
          Add Knowledge
        </h3>
        <input
          type="file"
          id="fileInput"
          accept=".txt,.pdf"
          style="display: none"
          onchange="handleFileUpload()"
        />
        <button
          class="upload-btn"
          onclick="document.getElementById('fileInput').click()"
        >
          + Upload TXT or PDF
        </button>
        <p
          id="uploadStatus"
          style="font-size: 0.8rem; color: #888; margin-top: 10px"
        ></p>
      </div>

      <button
        class="new-chat-btn"
        onclick="startNewChat()"
        style="margin-top: 20px"
      >
        + New Chat
      </button>

      <div class="sidebar-section">
        <h3 style="color: #ccc; font-size: 0.9rem; margin-bottom: 10px">
          Recent Chats
        </h3>
        <div
          id="sessionList"
          style="display: flex; flex-direction: column; gap: 5px"
        ></div>
      </div>
    </div>

    <div class="main-chat">
      <div class="chat-header">Local Documentation Assistant</div>

      <div class="chat-history" id="chatBox">
        <div class="message ai-msg">
          Hello! I am securely connected to your local technical documents. How
          can I help you today?
        </div>
        <div id="loadingIndicator" class="loading">
          Searching database and generating response...
        </div>
      </div>

      <div class="input-area">
        <input
          type="text"
          id="userInput"
          placeholder="Ask a question about your uploaded documents..."
          onkeypress="handleKeyPress(event)"
        />
        <button onclick="sendMessage()">Send</button>
      </div>
    </div>

    <script>
      let currentSessionId =
        "session_" + Math.random().toString(36).substr(2, 9);

      window.onload = loadSidebar;

      async function loadSidebar() {
        try {
          const response = await fetch("http://127.0.0.1:8000/api/v1/sessions");
          const data = await response.json();
          const sessionList = document.getElementById("sessionList");
          sessionList.innerHTML = "";

          data.sessions.forEach((session) => {
            const wrapper = document.createElement("div");
            wrapper.style.cssText =
              "display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;";

            const btn = document.createElement("button");
            btn.textContent = session.title;
            btn.style.cssText =
              "flex-grow: 1; text-align: left; background: none; border: none; color: #888; cursor: pointer; padding: 5px; font-size: 0.85rem; border-radius: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;";
            btn.onmouseover = () => (btn.style.backgroundColor = "#2d2d2d");
            btn.onmouseout = () => (btn.style.backgroundColor = "transparent");
            btn.onclick = () => loadChatHistory(session.id);

            const delBtn = document.createElement("button");
            delBtn.innerHTML = "🗑️";
            delBtn.style.cssText =
              "background: none; border: none; color: #ef4444; cursor: pointer; padding: 5px; font-size: 0.8rem; border-radius: 3px; max-width: 35px;";
            delBtn.title = "Delete Chat";
            delBtn.onmouseover = () =>
              (delBtn.style.backgroundColor = "#450a0a");
            delBtn.onmouseout = () =>
              (delBtn.style.backgroundColor = "transparent");
            delBtn.onclick = (e) => {
              e.stopPropagation();
              deleteSession(session.id);
            };

            wrapper.appendChild(btn);
            wrapper.appendChild(delBtn);
            sessionList.appendChild(wrapper);
          });
        } catch (error) {
          console.error("Failed to load sidebar", error);
        }
      }

      function startNewChat() {
        currentSessionId = "session_" + Math.random().toString(36).substr(2, 9);
        const chatBox = document.getElementById("chatBox");
        chatBox.innerHTML = `
                <div class="message ai-msg">Started a new conversation!</div>
                <div id="loadingIndicator" class="loading">Searching database and generating response...</div>
            `;
        // Clear the upload status message
        document.getElementById("uploadStatus").textContent = "";
      }

      async function loadChatHistory(sessionId) {
        currentSessionId = sessionId;
        const chatBox = document.getElementById("chatBox");
        chatBox.innerHTML = `<div id="loadingIndicator" class="loading">Searching database and generating response...</div>`;

        // Clear the upload status message when loading an old chat
        document.getElementById("uploadStatus").textContent = "";

        try {
          const response = await fetch(
            `http://127.0.0.1:8000/api/v1/session/${sessionId}`,
          );
          const data = await response.json();

          data.history.forEach((msg) => {
            const div = document.createElement("div");
            if (msg.role === "User") {
              div.className = "message user-msg";
              div.textContent = msg.content;
              chatBox.insertBefore(
                div,
                document.getElementById("loadingIndicator"),
              );
            } else {
              // Recreate the Glass-Box AI container for history
              div.className = "message ai-msg";
              div.style.display = "flex";
              div.style.flexDirection = "column";
              div.style.gap = "10px";

              const text = document.createElement("div");
              text.textContent = msg.content;
              div.appendChild(text);
              chatBox.insertBefore(
                div,
                document.getElementById("loadingIndicator"),
              );
            }
          });
          chatBox.scrollTop = chatBox.scrollHeight;
        } catch (error) {
          console.error("Failed to load history", error);
        }
      }

      async function deleteSession(sessionId) {
        if (!confirm("Are you sure you want to delete this chat permanently?"))
          return;

        try {
          await fetch(`http://127.0.0.1:8000/api/v1/session/${sessionId}`, {
            method: "DELETE",
          });

          if (sessionId === currentSessionId) {
            startNewChat();
          }
          loadSidebar();
        } catch (error) {
          console.error("Failed to delete session", error);
        }
      }

      async function handleFileUpload() {
        const fileInput = document.getElementById("fileInput");
        const file = fileInput.files[0];
        if (!file) return;

        const status = document.getElementById("uploadStatus");
        status.style.color = "#eab308";
        status.textContent = `Processing ${file.name}...`;

        const formData = new FormData();
        formData.append("file", file);
        // Send the session ID with the file upload
        formData.append("session_id", currentSessionId);

        try {
          const response = await fetch("http://127.0.0.1:8000/api/v1/upload", {
            method: "POST",
            body: formData,
          });

          if (response.ok) {
            status.style.color = "#4ade80";
            status.textContent = `Success! You can now ask about ${file.name}.`;
          } else {
            status.style.color = "#ef4444";
            status.textContent = `Failed to process file.`;
          }
        } catch (error) {
          status.style.color = "#ef4444";
          status.textContent = "Server connection error.";
        }
        fileInput.value = "";
      }

      async function sendMessage() {
        const inputField = document.getElementById("userInput");
        const chatBox = document.getElementById("chatBox");
        const loading = document.getElementById("loadingIndicator");
        const question = inputField.value.trim();

        if (!question) return;

        const userDiv = document.createElement("div");
        userDiv.className = "message user-msg";
        userDiv.textContent = question;
        chatBox.insertBefore(userDiv, loading);

        inputField.value = "";
        loading.style.display = "block";
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
          const response = await fetch("http://127.0.0.1:8000/api/v1/query", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              question: question,
              session_id: currentSessionId,
            }),
          });

          const data = await response.json();
          loading.style.display = "none";

          const aiContainer = document.createElement("div");
          aiContainer.className = "message ai-msg";
          aiContainer.style.display = "flex";
          aiContainer.style.flexDirection = "column";
          aiContainer.style.gap = "10px";

          const answerText = document.createElement("div");
          answerText.textContent = data.answer || "Error: No answer returned.";
          aiContainer.appendChild(answerText);

          if (data.status) {
            const metadataBox = document.createElement("div");
            metadataBox.style.backgroundColor = "#1e1e1e";
            metadataBox.style.padding = "10px";
            metadataBox.style.borderRadius = "5px";
            metadataBox.style.fontSize = "0.85rem";
            metadataBox.style.border = "1px solid #444";

            let sourcesHtml = "";
            if (data.sources && data.sources.length > 0) {
              sourcesHtml = `<details style="margin-top: 10px; cursor: pointer;">
                            <summary style="color: #3b82f6;">View Retrieved Context (${data.sources.length} chunks)</summary>
                            <div style="margin-top: 10px; color: #aaa; border-top: 1px solid #333; padding-top: 10px;">
                                ${data.sources.map((src, i) => `<p><strong>Chunk ${i + 1}:</strong> ${src}</p>`).join("")}
                            </div>
                        </details>`;
            }

            metadataBox.innerHTML = `
                        <span style="color: ${data.status.includes("Approved") ? "#4ade80" : "#ef4444"};">
                            <strong>Agent Routing:</strong> ${data.status}
                        </span>
                        ${sourcesHtml}
                    `;
            aiContainer.appendChild(metadataBox);
          }

          chatBox.insertBefore(aiContainer, loading);
          loadSidebar();
        } catch (error) {
          loading.style.display = "none";
          const errorDiv = document.createElement("div");
          errorDiv.className = "message ai-msg";
          errorDiv.style.color = "#ef4444";
          errorDiv.textContent =
            "Connection Error: Is your FastAPI server running?";
          chatBox.insertBefore(errorDiv, loading);
        }
        chatBox.scrollTop = chatBox.scrollHeight;
      }

      function handleKeyPress(event) {
        if (event.key === "Enter") sendMessage();
      }
    </script>
  </body>
</html>
