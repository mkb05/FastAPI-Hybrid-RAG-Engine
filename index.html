<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Enterprise RAG Navigator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.production.min.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
    ></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide-react"></script>
    <style>
      body {
        background-color: #0f172a;
        color: #f1f5f9;
      }
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect, useRef } = React;
      const {
        Send,
        Plus,
        Trash2,
        Upload,
        MessageSquare,
        Bot,
        User,
        Loader2,
        CheckCircle2,
      } = lucide;

      function App() {
        const [sessions, setSessions] = useState([]);
        const [messages, setMessages] = useState([]);
        const [currentSessionId, setCurrentSessionId] = useState(null);
        const [input, setInput] = useState("");
        const [loading, setLoading] = useState(false);
        const [status, setStatus] = useState("Idle");
        const chatEndRef = useRef(null);

        useEffect(() => {
          loadSidebar();
        }, []);

        const loadSidebar = async () => {
          const res = await fetch("http://127.0.0.1:8000/api/v1/sessions");
          const data = await res.json();
          setSessions(data.sessions || []);
        };

        const loadChat = async (id) => {
          setCurrentSessionId(id);
          const res = await fetch(`http://127.0.0.1:8000/api/v1/session/${id}`);
          const data = await res.json();
          setMessages(data.history || []);
        };

        const startNewChat = () => {
          setCurrentSessionId(
            "sess_" + Math.random().toString(36).substr(2, 9),
          );
          setMessages([]);
        };

        const handleUpload = async (e) => {
          const file = e.target.files[0];
          if (!file) return;

          const formData = new FormData();
          formData.append("file", file);
          formData.append("session_id", currentSessionId || "default");

          setStatus("Processing document...");
          await fetch("http://127.0.0.1:8000/api/v1/upload", {
            method: "POST",
            body: formData,
          });
          setStatus("Idle");
          loadSidebar();
        };

        const sendMessage = async () => {
          if (!input.trim()) return;
          const newMsg = { role: "User", content: input };
          setMessages((prev) => [...prev, newMsg]);
          setInput("");
          setLoading(true);
          setStatus("Agent working...");

          const res = await fetch("http://127.0.0.1:8000/api/v1/query", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              question: input,
              session_id: currentSessionId,
            }),
          });

          const data = await res.json();
          setMessages((prev) => [
            ...prev,
            {
              role: "AI",
              content: data.answer,
              status: data.status,
              sources: data.sources,
            },
          ]);
          setLoading(false);
          setStatus("Idle");
        };

        return (
          <div className="flex h-screen overflow-hidden font-sans">
            {/* Sidebar */}
            <div className="w-72 bg-slate-900 border-r border-slate-800 flex flex-col p-4">
              <h1 className="text-xl font-bold mb-6 text-blue-500">
                Nexus CRAG
              </h1>
              <button
                onClick={startNewChat}
                className="w-full bg-blue-600 hover:bg-blue-700 p-3 rounded-lg flex items-center gap-2 font-semibold transition"
              >
                <Plus size={20} /> New Conversation
              </button>

              <div className="flex-1 overflow-y-auto mt-6 space-y-2">
                {sessions.map((s) => (
                  <div
                    key={s.id}
                    onClick={() => loadChat(s.id)}
                    className="flex items-center justify-between p-3 rounded-lg hover:bg-slate-800 cursor-pointer text-sm"
                  >
                    <span className="truncate flex-1">{s.title}</span>
                    <Trash2
                      size={16}
                      className="text-slate-500 hover:text-red-400"
                    />
                  </div>
                ))}
              </div>

              <label className="mt-auto cursor-pointer p-4 border border-dashed border-slate-700 rounded-lg hover:border-blue-500 transition">
                <input type="file" className="hidden" onChange={handleUpload} />
                <div className="flex items-center gap-2 text-slate-400 text-sm">
                  <Upload size={16} /> <span>Upload Document</span>
                </div>
              </label>
            </div>

            {/* Chat Area */}
            <div className="flex-1 flex flex-col bg-slate-950">
              <header className="h-16 border-b border-slate-800 flex items-center px-6 justify-between">
                <div className="flex items-center gap-3">
                  <span className="bg-green-500/10 text-green-400 px-3 py-1 rounded-full text-xs font-medium border border-green-500/20">
                    Status: {status}
                  </span>
                </div>
              </header>

              <div className="flex-1 overflow-y-auto p-6 space-y-6">
                {messages.length === 0 && (
                  <div className="text-center mt-20 text-slate-500">
                    Start by uploading a document and asking a question.
                  </div>
                )}
                {messages.map((m, i) => (
                  <div
                    key={i}
                    className={`flex gap-4 ${m.role === "User" ? "justify-end" : ""}`}
                  >
                    {m.role === "AI" && (
                      <div className="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center shrink-0">
                        <Bot size={18} />
                      </div>
                    )}
                    <div
                      className={`max-w-[70%] p-4 rounded-2xl shadow-lg ${m.role === "User" ? "bg-blue-600" : "bg-slate-900 border border-slate-800"}`}
                    >
                      <p className="text-sm leading-relaxed">{m.content}</p>
                      {m.sources && (
                        <div className="mt-3 pt-3 border-t border-slate-700 text-[10px] text-slate-400">
                          <span className="font-bold">Agent Routing:</span>{" "}
                          {m.status}
                        </div>
                      )}
                    </div>
                    {m.role === "User" && (
                      <div className="w-8 h-8 rounded-full bg-slate-700 flex items-center justify-center shrink-0">
                        <User size={18} />
                      </div>
                    )}
                  </div>
                ))}
                {loading && (
                  <div className="text-blue-500 animate-pulse text-sm">
                    Thinking...
                  </div>
                )}
                <div ref={chatEndRef} />
              </div>

              <div className="p-6">
                <div className="flex gap-2">
                  <input
                    value={input}
                    onChange={(e) => setInput(e.target.value)}
                    onKeyPress={(e) => e.key === "Enter" && sendMessage()}
                    placeholder="Type your question..."
                    className="flex-1 bg-slate-900 border border-slate-700 rounded-xl p-4 focus:outline-none focus:border-blue-500"
                  />
                  <button
                    onClick={sendMessage}
                    className="bg-blue-600 p-4 rounded-xl hover:bg-blue-700"
                  >
                    <Send size={20} />
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
